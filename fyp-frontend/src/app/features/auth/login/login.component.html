<div class="auth-container">
  <div class="auth-card-wrapper">
    <mat-card class="auth-card">
      <mat-card-header>
        <div class="header-content">
          <div class="logo-container">
            <img src="assets/images/skillsync-logo.svg" alt="SkillSync" class="skillsync-logo" />
          </div>
          <h1>Find the right <span>team</span> for you</h1>
          <p>Connect with peers and mentors for your final year project</p>
        </div>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="off">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email address</mat-label>
            <input matInput type="email" formControlName="email" placeholder="you@example.com" autocomplete="new-email">
            <mat-icon matPrefix>mail_outline</mat-icon>
            <mat-error *ngIf="f['email'].hasError('required')">
              Email is required
            </mat-error>
            <mat-error *ngIf="f['email'].hasError('email')">
              Enter a valid email
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password"
              placeholder="Enter password" autocomplete="new-password">
            <mat-icon matPrefix>lock_outline</mat-icon>
            <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="f['password'].hasError('required')">
              Password is required
            </mat-error>
            <mat-error *ngIf="f['password'].hasError('minlength')">
              Minimum 6 characters required
            </mat-error>
          </mat-form-field>

          <button mat-raised-button color="primary" class="full-width login-button" type="submit"
            [disabled]="loading || loginForm.invalid">
            <span *ngIf="!loading">Sign in</span>
            <mat-spinner *ngIf="loading" diameter="24"></mat-spinner>
          </button>

          <div class="auth-footer">
            <p>New to SkillSync?
              <a routerLink="/auth/register" class="link">Create account</a>
            </p>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
