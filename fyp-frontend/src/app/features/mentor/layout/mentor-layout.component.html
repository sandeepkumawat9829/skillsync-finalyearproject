<div class="mentor-layout">
  <mat-toolbar color="primary" class="layout-toolbar">
    <button mat-icon-button (click)="toggleSidenav()">
      <mat-icon>menu</mat-icon>
    </button>
    <div class="toolbar-brand" [routerLink]="'/home'" style="cursor: pointer;">
      <img src="/assets/images/skillsync-logo.svg" alt="SkillSync" class="toolbar-logo" />
    </div>
    <span class="spacer"></span>
    <button mat-icon-button (click)="navigateTo('notifications')">
      <!-- TODO: Map to actual mentor notifications later, for now we will use the standard path if it exists -->
      <mat-icon [matBadge]="unreadCount" [matBadgeHidden]="unreadCount === 0" matBadgeColor="warn">notifications_outlined</mat-icon>
    </button>
    <button mat-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
      <span class="user-name">{{currentUser?.email}}</span>
    </button>
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="navigateTo('profile')">
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  <mat-sidenav-container class="layout-sidenav-container">
    <mat-sidenav #sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="sidenavOpened" (openedChange)="sidenavOpened = $event" class="layout-sidenav">
      <mat-nav-list>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/mentor/dashboard" routerLinkActive="active-link"
          [routerLinkActiveOptions]="{exact: true}">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/mentor/requests" routerLinkActive="active-link">
          <mat-icon matListItemIcon [matBadge]="pendingRequests" [matBadgeHidden]="pendingRequests === 0" matBadgeColor="warn">assignment</mat-icon>
          <span matListItemTitle>Mentorship Requests</span>
        </a>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/mentor/teams" routerLinkActive="active-link">
          <mat-icon matListItemIcon>groups</mat-icon>
          <span matListItemTitle>My Teams</span>
        </a>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/mentor/meetings" routerLinkActive="active-link">
          <mat-icon matListItemIcon>event</mat-icon>
          <span matListItemTitle>Meetings</span>
        </a>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/mentor/notifications" routerLinkActive="active-link">
          <mat-icon matListItemIcon [matBadge]="unreadCount" [matBadgeHidden]="unreadCount === 0" matBadgeColor="warn">notifications</mat-icon>
          <span matListItemTitle>Notifications</span>
        </a>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/mentor/profile" routerLinkActive="active-link">
          <mat-icon matListItemIcon>person</mat-icon>
          <span matListItemTitle>Profile</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="layout-content">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
