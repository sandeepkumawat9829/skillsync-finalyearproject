<div class="management-container">
  <div class="page-header">
    <h1><mat-icon>people</mat-icon> User Management</h1>
    <div class="header-actions">
      <mat-form-field appearance="outline" class="role-filter">
        <mat-label>Filter by Role</mat-label>
        <mat-select [(ngModel)]="selectedRole" (selectionChange)="applyFilter()">
          <mat-option *ngFor="let role of roles" [value]="role">{{role}}</mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="exportCSV()">
        <mat-icon>download</mat-icon> Export CSV
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="loading">
    <mat-spinner></mat-spinner>
  </div>

  <mat-card *ngIf="!loading" class="data-card">
    <table mat-table [dataSource]="filteredUsers" class="data-table">
      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let user">{{user.id}}</td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">{{user.fullName || 'N/A'}}</td>
      </ng-container>

      <!-- Email Column -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{user.email}}</td>
      </ng-container>

      <!-- Department Column -->
      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef>Department</th>
        <td mat-cell *matCellDef="let user">{{user.department || '-'}}</td>
      </ng-container>

      <!-- Role Column -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let user">
          <span class="role-badge" [ngClass]="getRoleColor(user.role)">{{user.role}}</span>
        </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let user">
          <span class="status-badge" [class.active]="user.isActive" [class.inactive]="!user.isActive">
            {{user.isActive ? 'Active' : 'Inactive'}}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let user">
          <button mat-icon-button
                  [color]="user.isActive ? 'warn' : 'primary'"
                  (click)="toggleUserStatus(user)"
                  [matTooltip]="user.isActive ? 'Deactivate' : 'Activate'">
            <mat-icon>{{user.isActive ? 'block' : 'check_circle'}}</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteUser(user.id)" matTooltip="Delete User">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div *ngIf="filteredUsers.length === 0" class="empty-state">
      <mat-icon>people_outline</mat-icon>
      <p>No users found</p>
    </div>
  </mat-card>
</div>
