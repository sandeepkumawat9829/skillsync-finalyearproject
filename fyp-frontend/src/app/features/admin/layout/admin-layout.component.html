<div class="admin-layout">
  <mat-toolbar class="layout-toolbar">
    <button mat-icon-button (click)="toggleSidenav()">
      <mat-icon>menu</mat-icon>
    </button>
    <div class="toolbar-brand" [routerLink]="'/home'" style="cursor: pointer;">
      <img src="/assets/images/skillsync-logo.svg" alt="SkillSync" class="toolbar-logo" />
      <span class="admin-badge">ADMIN</span>
    </div>
    <span class="spacer"></span>
    <button mat-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
      <span class="user-name">{{currentUser?.email}}</span>
    </button>
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  <mat-sidenav-container class="layout-sidenav-container">
    <mat-sidenav #sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="sidenavOpened"
      (openedChange)="sidenavOpened = $event" class="layout-sidenav">
      <mat-nav-list>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/admin/dashboard"
          routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/admin/users"
          routerLinkActive="active-link">
          <mat-icon matListItemIcon>people</mat-icon>
          <span matListItemTitle>User Management</span>
        </a>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/admin/projects"
          routerLinkActive="active-link">
          <mat-icon matListItemIcon>folder</mat-icon>
          <span matListItemTitle>Project Management</span>
        </a>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/admin/teams"
          routerLinkActive="active-link">
          <mat-icon matListItemIcon>groups</mat-icon>
          <span matListItemTitle>Team Management</span>
        </a>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/admin/buckets"
          routerLinkActive="active-link">
          <mat-icon matListItemIcon>inventory_2</mat-icon>
          <span matListItemTitle>Bucket Management</span>
        </a>
        <a mat-list-item (click)="isMobile ? toggleSidenav() : null" routerLink="/admin/mentor-assignment"
          routerLinkActive="active-link">
          <mat-icon matListItemIcon>supervisor_account</mat-icon>
          <span matListItemTitle>Mentor Assignment</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="layout-content">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
