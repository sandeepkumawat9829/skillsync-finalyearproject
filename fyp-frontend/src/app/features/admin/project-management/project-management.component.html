<div class="management-container">
  <div class="page-header">
    <h1><mat-icon>folder</mat-icon> Project Management</h1>
    <div class="header-actions">
      <button mat-raised-button color="primary" (click)="exportCSV()">
        <mat-icon>download</mat-icon> Export CSV
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="loading">
    <mat-spinner></mat-spinner>
  </div>

  <mat-card *ngIf="!loading" class="data-card">
    <table mat-table [dataSource]="projects" class="data-table">
      <ng-container matColumnDef="projectId">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let p"> {{p.projectId}} </td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef> Title </th>
        <td mat-cell *matCellDef="let p"> {{p.title}} </td>
      </ng-container>

      <ng-container matColumnDef="createdByName">
        <th mat-header-cell *matHeaderCellDef> Owner </th>
        <td mat-cell *matCellDef="let p"> {{p.createdByName || 'N/A'}} </td>
      </ng-container>

      <ng-container matColumnDef="domain">
        <th mat-header-cell *matHeaderCellDef> Domain </th>
        <td mat-cell *matCellDef="let p"> {{p.domain || '-'}} </td>
      </ng-container>

      <ng-container matColumnDef="teamName">
        <th mat-header-cell *matHeaderCellDef> Team </th>
        <td mat-cell *matCellDef="let p"> {{p.teamName || 'No Team'}} </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let p">
          <mat-form-field appearance="outline" class="status-select">
            <mat-select [value]="p.status" (selectionChange)="updateStatus(p.projectId, $event.value)">
              <mat-option value="PROPOSED">PROPOSED</mat-option>
              <mat-option value="APPROVED">APPROVED</mat-option>
              <mat-option value="REJECTED">REJECTED</mat-option>
              <mat-option value="COMPLETED">COMPLETED</mat-option>
            </mat-select>
          </mat-form-field>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let p">
          <button mat-icon-button color="warn" (click)="deleteProject(p.projectId)" matTooltip="Delete Project">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div *ngIf="projects.length === 0" class="empty-state">
      <mat-icon>folder_off</mat-icon>
      <p>No projects found</p>
    </div>
  </mat-card>
</div>
