# Application Properties for FYP Backend

# Server Configuration
server.port=8080

# Active Profile (dev uses H2, prod uses PostgreSQL)
spring.profiles.active=prod

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-default-dev-secret-key-at-least-256-bits-long-change-in-prod}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:4200

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Logging
logging.level.com.fyp=DEBUG
logging.level.org.springframework.security=DEBUG

# Cloudinary Configuration (Requires Environment Variables in Prod)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration (Gmail SMTP)
# IMPORTANT: For Gmail, you need to:
# 1. Enable 2-Factor Authentication in your Google Account
# 2. Generate an App Password at https://myaccount.google.com/apppasswords
# 3. Set the environment variables EMAIL_USERNAME and EMAIL_PASSWORD
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000



# Gemini AI Configuration
# Get API key from: https://aistudio.google.com/app/apikey
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
# App Configuration
app.name=FYP Management System
